<header class="header">
  <div class="header-container">
    <img src="assets/img/logo.png" class="logo" alt="logo" routerLink="/home" />

    <nav class="nav">
      <ul class="nav-links">
        <li>
          <a routerLink="/home" routerLinkActive="active">Inicio</a>
        </li>

        @if (usuario()) {
        <div class="user-info">
          <span>{{ usuario()?.nickname }}</span>
          <span class="rol">{{ usuario()?.rol }}</span>
        </div>
        <li>
          <a href="#" (click)="logout($event)">Cerrar Sesión</a>
        </li>
        } @else {
        <li>
          <a routerLink="/login" routerLinkActive="active">
            Iniciar Sesión
          </a>
        </li>
        }
      </ul>
    </nav>
  </div>
</header>
