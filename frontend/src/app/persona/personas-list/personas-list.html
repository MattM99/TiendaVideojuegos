<h2>Personas</h2>

<div class="top-actions">

  <button class="back-btn" routerLink="/home">
    Volver
  </button>

  <button class="create-button" routerLink="/personas/nueva">

    Nueva persona

  </button>

</div>

<div class="filters">

  <input type="text" placeholder="Buscar persona..." [value]="busqueda()"
    (input)="busqueda.set($any($event.target).value)" />

  <select (change)="changeSort($event)">

    <option value="apellido">
      Apellido
    </option>

    <option value="nombre">
      Nombre
    </option>

    <option value="dni">
      DNI
    </option>

  </select>

  <select (change)="changeDirection($event)">

    <option value="asc">
      Ascendente
    </option>

    <option value="desc">
      Descendente
    </option>

  </select>

  <select (change)="changeSize($event)">

    <option value="5">5</option>

    <option value="10">10</option>

    <option value="20">20</option>

  </select>

</div>

@if (personasFiltradas().length === 0) {

<p>No hay personas registradas.</p>

}

@else {

<table>

  <thead>

    <tr>

      <th>DNI</th>

      <th>Nombre</th>

      <th>Email</th>

      <th>Teléfono</th>

      <th>Acciones</th>

    </tr>

  </thead>

  <tbody>

    @for (p of personasFiltradas(); track p.dni) {

    <tr>

      <td>{{ p.dni }}</td>

      <td>
        {{ p.apellido }}, {{ p.nombre }}
      </td>

      <td>{{ p.email }}</td>

      <td>{{ p.telefono }}</td>

      <td class="acciones">

        <button [routerLink]="['/personas', p.dni]" ,
        >

          Editar

        </button>



      </td>

    </tr>

    }

  </tbody>

</table>

<div class="pagination">

  <button (click)="previousPage()" [disabled]="page() === 0">

    Anterior

  </button>

  <span>

    Página {{ page() + 1 }}
    de {{ totalPages() }}

  </span>

  <button (click)="nextPage()" [disabled]="page() >= totalPages() - 1">

    Siguiente

  </button>

</div>

}
